<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SPA routing restore: GitHub Pages 404.html redirects here with ?p=... -->
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var p = params.get('p');
        if (p) {
          history.replaceState(null, '', '/macro-tracker/' + decodeURIComponent(p));
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#22C55E" />
    <meta
      name="description"
      content="MacroTracker is a closed beta photo-first nutrition tracker. Request an invite to test meal capture, macro review, and AI-assisted logging."
    />
    <meta property="og:title" content="MacroTracker | Closed Beta" />
    <meta
      property="og:description"
      content="Photo-first nutrition tracking for beta testers. Request an invite to try MacroTracker."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/landing/macro-thumbnail.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MacroTracker | Closed Beta" />
    <meta
      name="twitter:description"
      content="Photo-first nutrition tracking for beta testers. Invite required."
    />
    <meta name="twitter:image" content="/landing/macro-thumbnail.jpg" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MacroTracker" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <title>MacroTracker | Closed Beta</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
